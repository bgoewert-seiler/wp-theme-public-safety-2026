# GitHub Actions Workflow for seiler-2026-theme
# Generated by @seilerinstrument/wp-build-tools
# Project type: theme

name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      matrix:
        php-version: ['8.0', '8.1', '8.2']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none

      - name: Configure npm registry
        run: |
          echo "@seilerinstrument:registry=https://npm.pkg.github.com" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          bun install
          composer install --no-interaction --prefer-dist
        working-directory: src

      - name: Run tests
        run: |
          bunx seiler-phpcs src || true
          bunx seiler-phpunit --testdox || true
          bun test || true

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Configure npm registry
        run: |
          echo "@seilerinstrument:registry=https://npm.pkg.github.com" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: bun install

      - name: Build distribution ZIP
        run: bunx seiler-build --zip

      - name: Get version from tag
        id: get_version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          # Mark as pre-release if:
          #   - tag has a semver pre-release suffix (e.g. 1.0.0-alpha.1, 2.0.0-rc.1)
          #   - major version is 0 (0.x.y is pre-1.0 by semver convention)
          if [[ "$VERSION" == *-* ]] || [[ "$VERSION" =~ ^0\. ]]; then
            echo "PRERELEASE=true" >> $GITHUB_OUTPUT
          else
            echo "PRERELEASE=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          if [ -f CHANGELOG.md ]; then
            # Extract section between this version and next version header
            BODY=$(sed -n "/^## \[${VERSION}\]/,/^## \[/{ /^## \[${VERSION}\]/d; /^## \[/d; p; }" CHANGELOG.md)
            if [ -z "$BODY" ]; then
              # Fallback: extract section between this version (without brackets) and next ##
              BODY=$(sed -n "/^## ${VERSION}/,/^## /{ /^## ${VERSION}/d; /^## /d; p; }" CHANGELOG.md)
            fi
            echo "$BODY" > /tmp/release-notes.md
          else
            echo "Release $VERSION" > /tmp/release-notes.md
          fi

      - name: Find ZIP file
        id: find_zip
        run: |
          ZIP_FILE=$(ls dist/*.zip | head -1)
          echo "ZIP_FILE=$ZIP_FILE" >> $GITHUB_OUTPUT
          echo "ZIP_NAME=$(basename $ZIP_FILE)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.md
          files: ${{ steps.find_zip.outputs.ZIP_FILE }}
          generate_release_notes: false
          draft: false
          prerelease: ${{ steps.get_version.outputs.PRERELEASE }}
